name: Daily Pulse Bot

on:
  schedule:
    - cron: '30 2 * * *'

  workflow_dispatch:

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Bot
        run: |
          python pulse_bot.py

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: pulse-reports
          path: summaries/