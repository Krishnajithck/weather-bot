name: Daily News Digest Email

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  send_digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send news digest email
        env:
          SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.GMAIL_SMTP_PASSWORD }}
          EMAIL_SENDER: "krishnajith.ck.dev@gmail.com"
          EMAIL_RECIPIENT: "krishnajithck123@gmail.com"
        run: |
          python news_digest.py
